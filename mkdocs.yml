site_name: 算法百炼
site_description: LeetCode high-frequency problem notes
site_url: https://shaominxu.github.io/leetcode-top-100/
repo_url: https://github.com/ShaominXu/leetcode-top-100
repo_name: ShaominXu/leetcode-top-100

theme:
  name: material
  language: zh
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: purple
      accent: indigo
  features:
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details

plugins:
  - search

extra_css:
  - stylesheets/extra.css

docs_dir: docs

